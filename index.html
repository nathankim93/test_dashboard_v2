<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1088 Operations Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Vite React 앱은 file:// 로 직접 열면 모듈이 로드되지 않아 하얀 화면만 보입니다.
      // Open_Dashboard.bat 로 서버를 띄운 뒤 http://127.0.0.1:5200/ 을 사용하세요.
      (function () {
        if (location.protocol !== 'file:') return
        var url = 'http://127.0.0.1:5200/'
        document.addEventListener('DOMContentLoaded', function () {
          document.body.innerHTML =
            '<div style="font-family:\'IBM Plex Sans\',Segoe UI,sans-serif;max-width:560px;margin:64px auto;padding:24px;color:#051C2C;line-height:1.5">' +
            '<div style="height:3px;width:48px;background:#00A9CE;margin-bottom:16px"></div>' +
            '<h1 style="font-family:\'Source Serif 4\',Georgia,serif;font-size:28px;margin:0 0 12px">1088 Operations Dashboard</h1>' +
            '<p style="color:#53565A;margin:0 0 16px"><strong>index.html을 직접 실행하면 화면이 비어 보입니다.</strong><br/>아래 BAT로 서버를 실행한 뒤 브라우저에서 열어 주세요.</p>' +
            '<ol style="color:#53565A;padding-left:20px;margin:0 0 20px">' +
            '<li><code>Open_Dashboard.bat</code> 더블클릭</li>' +
            '<li>자동으로 <a href="' + url + '">' + url + '</a> 가 열립니다</li>' +
            '</ol>' +
            '<p style="color:#53565A;margin:0 0 12px">서버가 이미 켜져 있다면 바로 이동을 시도합니다…</p>' +
            '<p><a href="' + url + '" style="display:inline-block;background:#051C2C;color:#fff;text-decoration:none;padding:10px 16px;font-weight:600">대시보드 열기</a></p>' +
            '</div>'
          setTimeout(function () {
            location.replace(url)
          }, 800)
        })
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
